<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Wuxia Chronicle — 武侠风云录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="wuxia-style.css">
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <h1>The Wuxia Chronicle</h1>
      <span class="zh">武侠风云录</span>
    </div>
    <div class="era" id="era">Year <b id="yr">1</b> · <span id="season">Spring</span> · <span id="alive">0</span> souls of the Jianghu</div>
    <div class="controls">
      <div class="speed" id="speed">
        <button data-s="900">▮</button>
        <button data-s="420" class="on">▮▮</button>
        <button data-s="160">▮▮▮</button>
        <button data-s="40">▮▮▮▮</button>
      </div>
      <button class="ctl" id="pause">❚❚ Pause</button>
      <button class="ctl primary" id="reseed">↻ New Age</button>
    </div>
  </div>

  <aside class="panel left">
    <div class="panel-title">Sects of the Jianghu <span class="ct" id="sectct">0</span></div>
    <div id="sectlist"></div>
  </aside>

  <main class="chronicle">
    <div class="chron-scroll" id="chron"></div>
    <div class="footer-note" id="fnote">The brush records all. Scroll up to read the past.</div>
  </main>

  <aside class="panel right">
    <div class="panel-title">State of the Jianghu</div>
    <div class="stat-grid">
      <div class="stat"><div class="v" id="s-fig">0</div><div class="l">Martial Artists</div></div>
      <div class="stat"><div class="v" id="s-war">0</div><div class="l">Active Wars</div></div>
      <div class="stat"><div class="v" id="s-art">0</div><div class="l">Living Arts</div></div>
      <div class="stat"><div class="v" id="s-lost">0</div><div class="l">Lost Arts</div></div>
    </div>
    <div class="legend">
      <span><i style="background:var(--righteous)"></i>正道 Righteous</span>
      <span><i style="background:var(--unorthodox)"></i>邪道 Unorthodox</span>
      <span><i style="background:var(--demonic)"></i>魔道 Demonic</span>
      <span><i style="background:var(--hermit)"></i>隐士 Hermit</span>
    </div>
    <div class="panel-title">The Mighty <span class="ct" id="figct">0</span></div>
    <div id="figlist"></div>
  </aside>
</div>
<script src="wuxia-data.js"></script>
<script src="wuxia-sim.js"></script>
</body>
</html>
